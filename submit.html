<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Suggest a Resource</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h2>💡 Suggest a New Resource</h2>
    <form action="https://formsubmit.co/YOUR_EMAIL@example.com" method="POST">
      <label>Course Title:</label><br />
      <input type="text" name="course" required /><br /><br />

      <label>Resource Name:</label><br />
      <input type="text" name="resource_name" required /><br /><br />

      <label>Resource URL:</label><br />
      <input type="url" name="url" required /><br /><br />

      <button type="submit">Submit Suggestion</button>
    </form>

    <p><a href="../index.html">← Back to Home</a></p>
  </body>
</html>
